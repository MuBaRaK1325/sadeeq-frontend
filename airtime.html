<!DOCTYPE html>
<html>

<head>

<title>Buy Airtime</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
background:#020b1f;
color:white;
font-family:Arial;
padding:20px;
}

input{
width:100%;
padding:14px;
margin-top:10px;
border-radius:10px;
border:none;
background:#08142c;
color:white;
}

button{
background:#3b78e7;
border:none;
padding:14px;
border-radius:10px;
color:white;
margin-top:10px;
width:100%;
cursor:pointer;
}

#networkLogo{
width:45px;
margin-top:10px;
display:none;
}

.modalOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:flex;
align-items:center;
justify-content:center;
z-index:2000;
}

.modalCard{
background:#08142c;
padding:20px;
border-radius:12px;
width:90%;
max-width:350px;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<h2>Buy Airtime</h2>

<input
id="phone"
placeholder="Phone number"
oninput="handlePhoneInput(this)"
>

<img id="networkLogo">

<input
id="amount"
type="number"
placeholder="Amount"
>

<button onclick="openPinModal(null,'airtime')">
Buy Airtime
</button>

<div id="pinModal" class="modalOverlay hidden">

<div class="modalCard">

<h3>Confirm Airtime Purchase</h3>

<input
type="password"
id="pin"
placeholder="Transaction PIN"
>

<button onclick="confirmPurchase()">Confirm</button>

<button onclick="closePinModal()">Cancel</button>

</div>

</div>
<img id="networkLogo" style="width:60px;display:none;margin:auto">
<script src="app.js"></script>

<script>

function openPinModal(planId,type){

window.selectedPlan = planId
window.purchaseType = type

document
.getElementById("pinModal")
.classList
.remove("hidden")

}

function closePinModal(){

document
.getElementById("pinModal")
.classList
.add("hidden")

}

</script>

</body>
</html>
