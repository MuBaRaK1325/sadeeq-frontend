<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MayConnect Admin</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<h2 id="usernameDisplay">Hello Admin</h2>

<p>Wallet Balance: <span id="walletBalance">₦0</span></p>

<div id="adminPanel">

<h3>Total Profit</h3>

<p id="profitBalance">₦0</p>

<button id="refreshProfit">Refresh</button>

<h3>Withdraw Profit</h3>

<input id="withdrawAmount" placeholder="Amount">

<input id="withdrawAccount" placeholder="Bank Account">

<button id="withdrawBtn">Withdraw</button>

<h3>Recent Transactions</h3>

<div id="transactionHistoryAdmin"></div>

</div>

<h3>My Transactions</h3>

<div id="transactionHistory"></div>

<button onclick="logout()">Logout</button>

<script src="app.js"></script>

</body>
