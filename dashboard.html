<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MAY-Connect | Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="styles.css">

<style>

body{
background:#000;
color:white;
font-family:Arial;
margin:0;
padding-bottom:90px;
display:none;
}

#dashboardLoader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#020b1f;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:9999;
}

.loader{
width:70px;
height:70px;
border:6px solid #0c1a36;
border-top:6px solid #3b78e7;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

.logo-circle{text-align:center;margin-top:20px;}
.logo-circle img{width:90px;}

.wallet-card{
background:linear-gradient(135deg,#3b78e7,#274ea3);
padding:20px;
border-radius:16px;
margin:20px;
text-align:center;
}

.wallet-card strong{font-size:30px;}

.admin-card{
background:#08142c;
margin:20px;
padding:20px;
border-radius:16px;
display:none;
}

.transaction-card{
background:#0c1a36;
padding:12px;
border-radius:12px;
margin:10px 20px;
}

.quickActions{
position:fixed;
bottom:100px;
right:20px;
display:flex;
flex-direction:column;
gap:14px;
}

.quickActions button{
background:#3b78e7;
border:none;
width:65px;
height:65px;
border-radius:50%;
color:white;
font-size:22px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.bottomNav{
position:fixed;
bottom:0;
width:100%;
height:70px;
background:#08142c;
display:flex;
justify-content:space-around;
align-items:center;
}

</style>
</head>

<body>

<!-- LOADER -->
<div id="dashboardLoader">
<div class="loader"></div>
<p style="margin-top:15px">Loading dashboard...</p>
</div>

<!-- HEADER -->
<div class="logo-circle">
<img src="images/logo.png">
</div>

<div style="text-align:center;margin-bottom:10px;">
<h3 id="usernameDisplay">Hello 👋 User</h3>
</div>

<!-- WALLET -->
<div class="wallet-card">
<p>Wallet Balance</p>
<strong id="walletBalance">₦0</strong>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="admin-card">

<h3>Admin Profit Withdrawal</h3>

<p>Total Profit</p>
<strong id="profitBalance">₦0</strong>

<input type="number" id="withdrawAmount" placeholder="Enter Amount">

<input type="text" id="bankName" placeholder="Bank Name">

<input type="text" id="accountNumber" placeholder="Account Number">

<button onclick="adminWithdraw()">Withdraw Profit</button>

</div>

<!-- POPULAR PLAN -->
<div style="margin:20px;background:#112c64;padding:15px;border-radius:12px;text-align:center">

<h4>🔥 Most Popular Data Plan</h4>

<p id="popularPlanText">1GB for ₦300</p>

<button id="popularPlanBtn">Buy Now</button>

</div>

<!-- TRANSACTIONS -->
<h3 style="margin-left:20px;">Recent Transactions</h3>

<div id="transactionHistory"></div>

<!-- QUICK ACTIONS -->
<div class="quickActions">

<button onclick="location.href='data.html'">📶<span>Data</span></button>

<button onclick="location.href='airtime.html'">📞<span>Airtime</span></button>

<button onclick="location.href='fund.html'">💳<span>Fund</span></button>

</div>

<script src="app.js"></script>

<script>

document.getElementById("popularPlanBtn").onclick=()=>{
purchasePlan("popular-plan");
}

/* emergency loader protection */

setTimeout(()=>{
document.getElementById("dashboardLoader").style.display="none";
document.body.style.display="block";
},6000);

</script>

</body>
</html>
